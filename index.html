<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You App</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fa;
      color: #1f2328;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin-top: 0;
      font-size: 32px;
    }
    h2 {
      margin-top: 28px;
      font-size: 20px;
    }
    p, li {
      line-height: 1.7;
      font-size: 16px;
    }
    .muted {
      color: #57606a;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>You App</h1>
      <p class="muted">开发阶段的 AI 旅行形象应用</p>

      <h2>应用简介</h2>
      <p>
        You App 是一款处于开发和测试阶段的移动应用，当前提供 Android alpha 测试版本。
        应用聚焦于旅行场景下的个人形象展示、照片浏览与基础账户登录体验。
      </p>

      <h2>当前功能</h2>
      <ul>
        <li>微信登录（测试接入中）</li>
        <li>今日照片展示</li>
        <li>历史照片查看</li>
        <li>个人设置与登录态管理</li>
      </ul>

      <h2>测试说明</h2>
      <p>
        当前版本仅用于内部开发测试与联调验证，功能仍在持续完善中。
      </p>

      <h2>联系方式</h2>
      <p>
        如需测试沟通或问题反馈，请联系项目负责人lx964080804@vip.qq.com。
      </p>
    </div>
  </div>
</body>
</html>
